{% load static %} <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>InventarioAPI - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@800&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body class="bg-[#faf8ff] font-['Inter'] min-h-screen flex items-center justify-center relative overflow-hidden">
    
    <div class="absolute top-[-10%] left-[-5%] w-[40%] h-[60%] rounded-full bg-blue-200 opacity-20 blur-[120px]"></div>

    <main class="w-full max-w-md px-6 z-10">
        <div class="bg-white p-10 rounded-2xl shadow-xl">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-['Manrope'] font-extrabold text-[#131b2e]">InventarioAPI</h2>
                <p class="text-slate-500 text-sm mt-2">Ingresa para gestionar el stock</p>
            </div>

            <div id="mensaje-error" class="hidden mb-6 p-3 bg-red-50 text-red-600 text-xs rounded-lg border border-red-100"></div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 ml-1 mb-2">USUARIO</label>
                    <input id="username" type="text" required placeholder="nombre.apellido" 
                           class="w-full px-4 py-3 rounded-xl bg-slate-50 border-none focus:ring-2 focus:ring-blue-600 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 ml-1 mb-2">CONTRASEÑA</label>
                    <input id="password" type="password" required placeholder="••••••••" 
                           class="w-full px-4 py-3 rounded-xl bg-slate-50 border-none focus:ring-2 focus:ring-blue-600 outline-none">
                </div>
                <button id="btnSubmit" type="submit" class="w-full primary-gradient text-white font-bold py-4 rounded-full shadow-lg flex justify-center items-center">
                    <span>Entrar al Sistema</span>
                    <div id="loader" class="hidden ml-3 w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                </button>
            </form>
        </div>
    </main>

    <script src="{% static "js/auth.js" %}"></script>
</body>
</html>
